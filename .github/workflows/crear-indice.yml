name: Crear indice HNSW Supabase

on:
  workflow_dispatch:

jobs:
  crear-indice:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Instalar psql
        run: sudo apt-get install -y postgresql-client

      - name: Forzar IPv4 y crear indice HNSW
        run: |
          # Resolver el host y obtener la IP IPv4
          HOST_IP=$(dig +short A db.xhnurftxuinlycmbsgij.supabase.co | head -1)
          echo "Conectando a IP: $HOST_IP"
          
          PGPASSWORD='Sucre1552..' psql -h "$HOST_IP" -U postgres -d postgres -p 5432 << 'EOF'
          SET statement_timeout = '1200000';
          CREATE INDEX IF NOT EXISTS fragmentos_embedding_hnsw_idx
          ON fragmentos
          USING hnsw ((embedding::halfvec(2048)) halfvec_cosine_ops)
          WITH (m = 16, ef_construction = 64);
          \echo 'Indice creado exitosamente'
          EOF
