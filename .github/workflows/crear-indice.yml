name: Crear indice HNSW Supabase

on:
  workflow_dispatch:

jobs:
  crear-indice:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Llamar funcion via REST
        run: |
          curl -X POST \
            "https://xhnurftxuinlycmbsgij.supabase.co/rest/v1/rpc/crear_indice_hnsw" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 1800 \
            -v
