name: Crear indice HNSW Supabase

on:
  workflow_dispatch:

jobs:
  crear-indice:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Crear indice HNSW via API
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import time

          PROJECT_REF = "xhnurftxuinlycmbsgij"
          ACCESS_TOKEN = "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

          sql = """
          CREATE INDEX IF NOT EXISTS fragmentos_embedding_hnsw_idx
          ON fragmentos
          USING hnsw ((embedding::halfvec(2048)) halfvec_cosine_ops)
          WITH (m = 16, ef_construction = 64);
          """

          url = f"https://api.supabase.com/v1/projects/{PROJECT_REF}/database/query"
          data = json.dumps({"query": sql}).encode()
          req = urllib.request.Request(
              url,
              data=data,
              headers={
                  "Authorization": f"Bearer {ACCESS_TOKEN}",
                  "Content-Type": "application/json"
              },
              method="POST"
          )

          print("Creando indice HNSW via Supabase API...")
          print("Esto puede tardar varios minutos...")

          with urllib.request.urlopen(req, timeout=1800) as resp:
              result = json.loads(resp.read())
              print("Resultado:", result)
              print("Indice creado exitosamente!")
          EOF
