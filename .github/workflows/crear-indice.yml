name: Crear indice HNSW Supabase

on:
  workflow_dispatch:

jobs:
  crear-indice:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Instalar psycopg2
        run: pip install psycopg2-binary

      - name: Crear indice HNSW
        run: |
          python3 << 'EOF'
          import psycopg2
          import socket

          # Forzar IPv4
          orig = socket.getaddrinfo
          def ipv4_only(host, port, family=0, *args, **kwargs):
              return orig(host, port, socket.AF_INET, *args, **kwargs)
          socket.getaddrinfo = ipv4_only

          print("Conectando a Supabase...")
          conn = psycopg2.connect(
              host="db.xhnurftxuinlycmbsgij.supabase.co",
              port=5432,
              user="postgres",
              password="Sucre1552..",
              dbname="postgres",
              connect_timeout=30
          )
          conn.autocommit = True
          cur = conn.cursor()
          print("Conectado! Creando indice HNSW (puede tardar varios minutos)...")
          cur.execute("SET statement_timeout = '1200000'")
          cur.execute("""
              CREATE INDEX IF NOT EXISTS fragmentos_embedding_hnsw_idx
              ON fragmentos
              USING hnsw ((embedding::halfvec(2048)) halfvec_cosine_ops)
              WITH (m = 16, ef_construction = 64)
          """)
          print("Indice creado exitosamente!")
          cur.close()
          conn.close()
          EOF
